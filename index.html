<!doctype html>
<html>
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0f0f0f;
      }

      .side-by-side {
        display: flex;
        width: 100%;
        height: 500px;
      }
      .side-by-side .left {
        flex: 1;
        min-width: 0;
      }
      .side-by-side .right {
        width: 550px;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <!-- Ticker Tape -->
    <script
      type="module"
      src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"
    ></script>
    <tv-ticker-tape
      symbols="FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FOREXCOM:DJI,FX:EURUSD,BITSTAMP:BTCUSD,BITSTAMP:ETHUSD,CMCMARKETS:GOLD"
    ></tv-ticker-tape>

    <!-- Heatmap (left) + Forex Cross Rates (right) -->
    <div class="side-by-side">
      <!-- LEFT: Stock Heatmap -->
      <div class="left">
        <div
          class="tradingview-widget-container"
          style="height: 100%; width: 100%"
        >
          <div
            class="tradingview-widget-container__widget"
            style="height: 100%; width: 100%"
          ></div>
          <div class="tradingview-widget-copyright">
            <a
              href="https://www.tradingview.com/heatmap/stock/"
              rel="noopener nofollow"
              target="_blank"
            >
              <span class="blue-text">Stock Heatmap</span> </a
            ><span class="trademark"> by TradingView</span>
          </div>
          <script
            type="text/javascript"
            src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js"
            async
          >
            {
              "dataSource": "SPX500",
              "blockSize": "market_cap_basic",
              "blockColor": "change",
              "grouping": "sector",
              "locale": "en",
              "symbolUrl": "",
              "colorTheme": "dark",
              "exchanges": [],
              "hasTopBar": false,
              "isDataSetEnabled": false,
              "isZoomEnabled": true,
              "hasSymbolTooltip": true,
              "isMonoSize": false,
              "width": "100%",
              "height": "100%"
            }
          </script>
        </div>
      </div>

      <!-- RIGHT: Forex Cross Rates -->

    </div>
</div>

<div
  class="tradingview-widget-container"
  style="height: 100%; width: 100%"
>
  <div
    class="tradingview-widget-container__widget"
    style="height: 100%; width: 100%"
  ></div>
  <div class="tradingview-widget-copyright">
    <a
      href="https://www.tradingview.com/markets/currencies/"
      rel="noopener nofollow"
      target="_blank"
    >
      <span class="blue-text">Forex market</span> </a
    ><span class="trademark"> by TradingView</span>
  </div>
  <script
    type="text/javascript"
    src="https://s3.tradingview.com/external-embedding/embed-widget-forex-cross-rates.js"
    async
  >
    {
      "colorTheme"; "dark",
      "isTransparent"; false,
      "locale"; "en",
      "currencies"; ["EUR","USD","JPY","GBP","CHF","AUD","CAD","NZD","CNY"],
      "backgroundColor"; "#0F0F0F",
      "width"; "100%",
      "height"; "100%"
    }
  </script>
</div>
    <!-- Market Quotes (full width) -->
    <div class="tradingview-widget-container" style="width: 100%">
      <div class="tradingview-widget-container__widget"></div>
      <div class="tradingview-widget-copyright">
        <a
          href="https://www.tradingview.com/markets/"
          rel="noopener nofollow"
          target="_blank"
        >
          <span class="blue-text">Market summary</span> </a
        ><span class="trademark"> by TradingView</span>
      </div>
      <script
        type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js"
        async
      >
        {
          "colorTheme"; "dark",
          "locale"; "en",
          "largeChartUrl"; "",
          "isTransparent"; false,
          "showSymbolLogo"; true,
          "backgroundColor"; "#0F0F0F",
          "support_host"; "https://www.tradingview.com",
          "width"; "100%",
          "height"; 550,
          "symbolsGroups"; [
            {
              "name": "Indices",
              "symbols": [
                { "name": "FOREXCOM:SPXUSD", "displayName": "S&P 500 Index" },
                { "name": "FOREXCOM:NSXUSD", "displayName": "US 100 Cash CFD" },
                { "name": "FOREXCOM:DJI", "displayName": "Dow Jones Industrial Average Index" },
                { "name": "INDEX:NKY", "displayName": "Japan 225" },
                { "name": "INDEX:DEU40", "displayName": "DAX Index" },
                { "name": "FOREXCOM:UKXGBP", "displayName": "FTSE 100 Index" }
              ]
            },
            {
              "name": "Futures",
              "symbols": [
                { "name": "BMFBOVESPA:ISP1!", "displayName": "S&P 500" },
                { "name": "BMFBOVESPA:EUR1!", "displayName": "Euro" },
                { "name": "CMCMARKETS:GOLD", "displayName": "Gold" },
                { "name": "PYTH:WTI3!", "displayName": "WTI Crude Oil" },
                { "name": "BMFBOVESPA:CCM1!", "displayName": "Corn" }
              ]
            },
            {
              "name": "Bonds",
              "symbols": [
                { "name": "EUREX:FGBL1!", "displayName": "Euro Bund" },
                { "name": "EUREX:FBTP1!", "displayName": "Euro BTP" },
                { "name": "EUREX:FGBM1!", "displayName": "Euro BOBL" }
              ]
            },
            {
              "name": "Forex",
              "symbols": [
                { "name": "FX:EURUSD", "displayName": "EUR to USD" },
                { "name": "FX:GBPUSD", "displayName": "GBP to USD" },
                { "name": "FX:USDJPY", "displayName": "USD to JPY" },
                { "name": "FX:USDCHF", "displayName": "USD to CHF" },
                { "name": "FX:AUDUSD", "displayName": "AUD to USD" },
                { "name": "FX:USDCAD", "displayName": "USD to CAD" }
              ]
            }
          ]
        }
      </script>
    </div>


    <!-- XAUUSD Chart -->
    <div
      class="tradingview-widget-container"
      style="height: 600px; width: 100%"
    >
      <div
        class="tradingview-widget-container__widget"
        style="height: calc(100% - 32px); width: 100%"
      ></div>
      <div class="tradingview-widget-copyright">
        <a
          href="https://www.tradingview.com/symbols/XAUUSD/?exchange=OANDA"
          rel="noopener nofollow"
          target="_blank"
        >
          <span class="blue-text">XAUUSD chart</span> </a
        ><span class="trademark"> by TradingView</span>
      </div>
      <script
        type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js"
        async
      >
        {
          "allow_symbol_change"; true,
          "calendar"; false,
          "details"; false,
          "hide_side_toolbar"; true,
          "hide_top_toolbar"; false,
          "hide_legend"; false,
          "hide_volume"; false,
          "hotlist"; false,
          "interval"; "D",
          "locale"; "en",
          "save_image"; true,
          "style"; "1",
          "symbol"; "OANDA:XAUUSD",
          "theme"; "dark",
          "timezone"; "Etc/UTC",
          "backgroundColor"; "#0F0F0F",
          "gridColor"; "rgba(242, 242, 242, 0.06)",
          "watchlist"; [],
          "withdateranges"; false,
          "compareSymbols"; [],
          "studies"; [],
          "autosize"; true
        }
      </script>

      <script>
  // save scroll position before refresh
  window.addEventListener("beforeunload", () => {
    localStorage.setItem("scrollY", window.scrollY);
  });

  // restore scroll position after load
  window.addEventListener("load", () => {
    const scrollY = localStorage.getItem("scrollY");
    if (scrollY !== null) {
      window.scrollTo(0, parseInt(scrollY));
    }
  });
</script>
    </div>
  </body>
</html>
